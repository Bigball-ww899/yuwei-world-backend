<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>雨薇的小世界</title>
    <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #f6f8fc;
      color: #263245;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 32px;
    }

    .hero {
      background: white;
      border-radius: 28px;
      padding: 20px 30px;
      margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(92, 124, 180, 0.12);
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    .subtitle {
      margin-top: 8px;
      color: #6b7890;
      line-height: 1.8;
    }

.main-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 22px;
}

.right-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}

    .card {
      background: white;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 10px 24px rgba(92, 124, 180, 0.1);
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .big-number {
      font-size: 52px;
      font-weight: 700;
      color: #4e7edb;
    }

    .progress {
      height: 10px;
      background: #e8edf5;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 14px;
    }

    .bar {
      height: 100%;
      background: #6d95e8;
      border-radius: 999px;
    }

    .timeline {
      border-left: 2px solid #f1b7d2;
      padding-left: 18px;
    }

.timeline div {
  position: relative;
  margin: 18px 0;
  line-height: 1.7;
  background: rgba(255, 255, 255, 0.62);
  border-radius: 16px;
  padding: 12px 14px;
}

.timeline div::before {
  content: "";
  position: absolute;
  left: -25px;
  top: 8px;
  width: 10px;
  height: 10px;
  background: #f1b7d2;
  border-radius: 50%;
}

.timeline-date {
  display: block;
  margin-bottom: 4px;
  color: #c46c98;
  font-size: 13px;
  font-weight: 700;
}

.timeline-text {
  display: block;
  color: #4e5d73;
  font-size: 14px;
}

    .money {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .pocket {
      margin-top: 18px;
    }

.pocket-list {
  margin-top: 10px;
}

.pocket-amount {
  margin-top: 6px;
  color: #7a8aa3;
  font-size: 13px;
}

    .pocket-title {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      color: #56657c;
    }

    .photo-card {
      background: white;
      border-radius: 28px;
      padding: 18px;
      margin-bottom: 24px;
      box-shadow: 0 12px 30px rgba(92, 124, 180, 0.12);
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 18px;
      align-items: stretch;
    }

.photo-card img {
    height: 360px;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    object-position: left center;
    border-radius: 22px;
    display: block;
}

    .photo-caption {
      border-radius: 22px;
      background: linear-gradient(135deg, #eef6ff, #fff5fa);
      padding: 26px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #5b6f95;
    }

    .photo-caption strong {
      color: #263245;
      font-size: 30px;
      line-height: 1.35;
      margin-top: 14px;
    }

    .photo-caption .note {
      margin-top: 18px;
      line-height: 1.8;
      color: #6b7890;
    }

    @media (max-width: 800px) {
      .photo-card {
        grid-template-columns: 1fr;
      }

      .photo-card img {
        height: auto;
        aspect-ratio: 4 / 3;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
    .life-card {
    background: #fff7fb;
}

.house-card {
    transform: translateY(10px);
    background: #eef6ff;
}

.money-card {
    transform: translateY(-6px);
    background: #fffaf0;
    min-height: 220px;
}

.pocket-card {
    transform: translateY(18px);
    background: #f5fff4;
    max-width: 360px;
}
.money-container {
    display: flex;
    align-items: center;
    gap: 12px;
}

.eye-btn {
    border: none;
    background: transparent;
    font-size: 24px;
    cursor: pointer;
}

.eye-btn:hover {
    transform: scale(1.1);
}
.card-desc {
    color: #6b7890;
    margin-bottom: 12px;
}

.money-note {
    margin-top: 18px;
    line-height: 1.8;
    color: #6b7890;
    font-size: 14px;
}

.timeline-card {
  transform: translateY(0);
  min-height: 340px;
  position: sticky;
  top: 20px;
  align-self: start;
}

.home-progress-wrap {
    margin-top: 18px;
}

.home-progress {
    position: relative;
    height: 22px;
    background: #dbe8ff;
    border-radius: 999px;
    overflow: visible;
}

.home-progress-bar {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, #8fb3ff, #ffc7dc);
    border-radius: 999px;
}

.home-people {
    position: absolute;
    top: -24px;
    left: 0;
    transform: translateX(-50%);
    font-size: 24px;
}

.home-end {
    position: absolute;
    right: -4px;
    top: -28px;
    font-size: 26px;
}
    .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .add-btn {
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        background: #f1b7d2;
        color: white;
        font-size: 28px;
        cursor: pointer;

        padding: 0;
    }

    .life-form {
        display: none;
        margin-top: 16px;
    }

    .life-form input,
    .life-form textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #f1d6e4;
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 10px;
        font-family: inherit;
    }

    .life-form textarea {
        min-height: 80px;
        resize: none;
    }

    .life-form button {
        border: none;
        border-radius: 999px;
        padding: 9px 18px;
        background: #6d95e8;
        color: white;
        cursor: pointer;
    }

    .modal-mask {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(38, 50, 69, 0.28);
        z-index: 99;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal-mask.show {
        display: flex;
    }

    .modal-card {
        width: min(420px, 100%);
        background: white;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 18px 48px rgba(92, 124, 180, 0.22);
    }

    .modal-card h3 {
        margin: 0 0 16px;
        font-size: 22px;
        color: #263245;
    }

    .pocket-form input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d9e3f3;
        border-radius: 14px;
        padding: 11px 12px;
        margin-bottom: 10px;
        font-family: inherit;
    }

    .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 6px;
    }

    .modal-actions button {
        border: none;
        border-radius: 999px;
        padding: 9px 18px;
        cursor: pointer;
        font-family: inherit;
    }

    .cancel-btn {
        background: #eef2f8;
        color: #6b7890;
    }

    .save-btn {
        background: #6d95e8;
        color: white;
    }
    .section-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .pocket-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }

    .pocket-actions button {
        border: none;
        border-radius: 999px;
        padding: 5px 10px;
        cursor: pointer;
        background: #eef2f8;
        color: #6b7890;
    }
    .pocket-form textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d9e3f3;
        border-radius: 14px;
        padding: 11px 12px;
        margin-bottom: 10px;
        font-family: inherit;
        min-height: 90px;
        resize: none;
    }
  </style>
</head>
<body>
<div class="page">
    <section class="hero">
        <h1>🌷 雨薇的小世界</h1>
        <p class="subtitle">
            原来我的人生正在慢慢变好。
        </p>
    </section>

    <section class="photo-card">
        <img id="lifePhotoImage" src="" alt="本月封面">
        <div class="photo-caption">
            <div>
                <div class="section-title">
                <span>📸 人生照片</span>
                    <button class="add-btn" id="addPhotoBtn">
                        +
                    </button>
                </div>
                <strong id="lifePhotoTitle"></strong>
                <p class="note" id="lifePhotoDescription"></p>
            </div>
            <span id="lifePhotoDate"></span>
        </div>
    </section>

    <section class="main-layout">
        <div class="card life-card timeline-card">
            <div class="section-title">
            <h2>🌱 最近的我</h2>
            <button class="add-btn" id="addLifeBtn">+</button>
            </div>
            <div class="timeline" id="timeline">
            </div>
            <div class="life-form" id="lifeForm">
                <input type="date" id="eventDateInput">
                <textarea id="contentInput" placeholder="今天发生了什么呀？"></textarea>
                <button id="saveLifeBtn">保存</button>
            </div>
        </div>

        <div class="right-content">
            <div class="card house-card">
                <h2>🏠 新家倒计时</h2>
                <p>距离新家交付还有</p>
                <div class="big-number">
                    <span id="homeDays">--</span> 天
                </div>
<!--                <div class="progress">-->
<!--                    <div class="bar" id="homeProgressBar"></div>-->
<!--                </div>-->
                <div class="home-progress-wrap">
                    <div class="home-progress">
                        <div class="home-progress-bar" id="homeProgressBar"></div>
                        <span class="home-people" id="homePeople">👫💕</span>
                        <span class="home-end">🏠</span>
                    </div>
                </div>
                <p>已经走过 <span id="homeProgressText">--</span>%的等待进度</p>
            </div>

            <div class="card money-card">
                <h2>💰 我的积累</h2>
                <p class="card-desc">现拥有资金额度</p>

                <div class="money-container">
                    <div class="money" id="moneyAmount">******</div>

                    <button id="eyeBtn" class="eye-btn">
                        👁️
                    </button>
                    <button id="editAssetBtn" class="eye-btn">
                        ✏️
                    </button>
                </div>

                <p class="money-note">
                    这些钱里有房贷、房租、装修基金、份子钱等等<br>
                    但它们都代表：我已经比以前月光的自己厉害好多好多。
                </p>
            </div>



            <div class="card pocket-card">
                <div class="section-title">
                    <h2>🐷 荷包进度</h2>
                    <button class="add-btn" id="addPocketBtn">+</button>
                </div>
                <div class="pocket-list" id="pocketList">
                </div>
            </div>
        </div>
    </section>

    <div class="modal-mask" id="pocketModal">
        <div class="modal-card">
            <h3 id="pocketModalTitle">新增荷包</h3>
            <div class="pocket-form">
                <input type="text" id="pocketIconInput" placeholder="图标，比如 🏠">
                <input type="text" id="pocketNameInput" placeholder="荷包名称">
                <input type="number" id="currentAmountInput" placeholder="当前金额" step="0.01">
                <input type="number" id="targetAmountInput" placeholder="目标金额" step="0.01">
                <div class="modal-actions">
                    <button class="cancel-btn" id="cancelPocketBtn">取消</button>
                    <button class="save-btn" id="savePocketBtn">保存荷包</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="photoModal">
        <div class="modal-card">

            <h3>新增人生照片</h3>

            <div class="pocket-form">

                <input
                        type="text"
                        id="photoTitleInput"
                        placeholder="标题">

                <input
                        type="date"
                        id="photoDateInput">

                <input type="file" id="photoFileInput">

                <textarea
                        id="photoDescriptionInput"
                        placeholder="照片故事"></textarea>

                <div class="modal-actions">

                    <button
                            class="cancel-btn"
                            id="cancelPhotoBtn">
                        取消
                    </button>

                    <button
                            class="save-btn"
                            id="savePhotoBtn">
                        保存照片
                    </button>

                </div>

            </div>

        </div>
    </div>

</div>
<script>
//显隐交互
    let isVisible = false;

    const eyeBtn = document.getElementById("eyeBtn");
    const moneyAmount = document.getElementById("moneyAmount");

    eyeBtn.addEventListener("click", () => {

        isVisible = !isVisible;

        if (isVisible) {
            moneyAmount.innerText = "¥" + assetAmount;
            eyeBtn.innerText = "🙈";
        }else {
            moneyAmount.innerText = "******";
            eyeBtn.innerText = "👁️";
        }

    });
//交付日期计算
    const buyDate = new Date("2025-07-26");
    const deliveryDate = new Date("2026-12-31");
    const today = new Date();

    const oneDay = 1000 * 60 * 60 * 24;

    const totalDays = Math.ceil((deliveryDate - buyDate) / oneDay);
    const passedDays = Math.ceil((today - buyDate) / oneDay);
    const leftDays = Math.max(0, Math.ceil((deliveryDate - today) / oneDay));

    const progress = Math.min(100, Math.max(0, Math.round((passedDays / totalDays) * 100)));

    document.getElementById("homeDays").innerText = leftDays;
    document.getElementById("homeProgressText").innerText = progress;
    document.getElementById("homeProgressBar").style.width = progress + "%";
    document.getElementById("homePeople").style.left = progress + "%";
//新增人生动态
    const addLifeBtn = document.getElementById("addLifeBtn");
    const lifeForm = document.getElementById("lifeForm");
    const saveLifeBtn = document.getElementById("saveLifeBtn");

    addLifeBtn.addEventListener("click", () => {
        lifeForm.style.display =
            lifeForm.style.display === "block" ? "none" : "block";
    });

    saveLifeBtn.addEventListener("click", async () => {
        const eventDate = document.getElementById("eventDateInput").value;
        const content = document.getElementById("contentInput").value.trim();

        if (!eventDate || !content) {
            alert("日期和内容都需填写哦～");
            return;
        }

        await fetch("/api/life-events", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: content,
                eventDate: eventDate
            })
        });

        document.getElementById("contentInput").value = "";
        lifeForm.style.display = "none";

        loadLifeEvents();
    });
// 加载人生动态
    async function loadLifeEvents() {

        const response = await fetch(
            "/api/life-events?days=7"
        );

        const data = await response.json();

        const timeline = document.getElementById("timeline");

        timeline.innerHTML = "";

        data.forEach(event => {

            timeline.innerHTML += `
                <div>
                    <span class="timeline-date">
                        ${event.eventDate}
                    </span>

                    <span class="timeline-text">
                        ${event.content}
                    </span>
                </div>
            `;

        });

    }
// 加载荷包进度
async function loadPockets() {

    const response = await fetch(
        "/api/pockets"
    );

    const data = await response.json();

    const pocketList = document.getElementById("pocketList");

    pocketList.innerHTML = "";

    data.forEach(pocket => {

        pocketList.innerHTML += `
            <div class="pocket">
                <div class="pocket-title">
                    <span>${pocket.icon || "🐷"} ${pocket.name}</span>
                    <span>${pocket.progress}%</span>
                </div>

                <div class="pocket-amount">
                    ¥${pocket.currentAmount} / ¥${pocket.targetAmount}
                </div>

                <div class="progress">
                    <div class="bar" style="width: ${pocket.progress}%;"></div>
                </div>
                <div class="pocket-actions">
                    <button onclick="editPocket(${pocket.id}, '${pocket.icon || "🐷"}', '${pocket.name}', ${pocket.currentAmount}, ${pocket.targetAmount})">编辑</button>
                    <button onclick="deletePocket(${pocket.id})">删除</button>
                </div>
            </div>
        `;

    });

}

    const addPocketBtn = document.getElementById("addPocketBtn");
    const pocketModal = document.getElementById("pocketModal");
    const cancelPocketBtn = document.getElementById("cancelPocketBtn");
    const savePocketBtn = document.getElementById("savePocketBtn");
    let editingPocketId = null;

    addPocketBtn.addEventListener("click", () => {
        resetPocketForm();
        pocketModal.classList.add("show");
    });

    cancelPocketBtn.addEventListener("click", () => {
        resetPocketForm();
        pocketModal.classList.remove("show");
    });

    pocketModal.addEventListener("click", (event) => {
        if (event.target === pocketModal) {
            resetPocketForm();
            pocketModal.classList.remove("show");
        }
    });

    savePocketBtn.addEventListener("click", async () => {
        const icon = document.getElementById("pocketIconInput").value.trim() || "🐷";
        const name = document.getElementById("pocketNameInput").value.trim();
        const currentAmount = document.getElementById("currentAmountInput").value;
        const targetAmount = document.getElementById("targetAmountInput").value;

        if (!name || !currentAmount || !targetAmount) {
            alert("荷包名称、当前金额和目标金额都需填写");
            return;
        }

        const url = editingPocketId
            ? `/api/pockets/${editingPocketId}`
            : "/api/pockets";

        const method = editingPocketId ? "PUT" : "POST";

        await fetch(url, {
            method: method,
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                icon: icon,
                name: name,
                currentAmount: Number(currentAmount),
                targetAmount: Number(targetAmount)
            })
        });

        editingPocketId = null;
        document.getElementById("pocketModalTitle").innerText = "新增荷包";
        savePocketBtn.innerText = "保存荷包";
        document.getElementById("pocketIconInput").value = "";
        document.getElementById("pocketNameInput").value = "";
        document.getElementById("currentAmountInput").value = "";
        document.getElementById("targetAmountInput").value = "";

        pocketModal.classList.remove("show");

        loadPockets();
    });

    function editPocket(id, icon, name, currentAmount, targetAmount) {
        editingPocketId = id;

        document.getElementById("pocketModalTitle").innerText = "编辑荷包";
        savePocketBtn.innerText = "保存修改";

        document.getElementById("pocketIconInput").value = icon;
        document.getElementById("pocketNameInput").value = name;
        document.getElementById("currentAmountInput").value = currentAmount;
        document.getElementById("targetAmountInput").value = targetAmount;

        pocketModal.classList.add("show");
    }

    function resetPocketForm() {
        editingPocketId = null;
        document.getElementById("pocketModalTitle").innerText = "新增荷包";
        savePocketBtn.innerText = "保存荷包";

        document.getElementById("pocketIconInput").value = "";
        document.getElementById("pocketNameInput").value = "";
        document.getElementById("currentAmountInput").value = "";
        document.getElementById("targetAmountInput").value = "";
    }

    async function deletePocket(id) {
        if (!confirm("确定要删除这个荷包吗？")) {
            return;
        }

        await fetch(`/api/pockets/${id}`, {
            method: "DELETE"
        });

        loadPockets();
    }

    let assetAmount = "0";
    async function loadAsset() {

        const response = await fetch(
            "/api/asset"
        );

        const data = await response.json();

        assetAmount = data.amount;

    }

    const editAssetBtn = document.getElementById("editAssetBtn");
    editAssetBtn.addEventListener("click", async () => {

        const newAmount = prompt(
            "请输入当前积累金额",
            assetAmount
        );

        if (newAmount === null) {
            return;
        }

        await fetch(
            "/api/asset",
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    amount: Number(newAmount)
                })
            }
        );

        await loadAsset();

        if (isVisible) {
            moneyAmount.innerText =
                "¥" + assetAmount;
        }

    });

    async function loadLifePhoto() {

        const response = await fetch(
            "/api/life-photos"
        );

        const data = await response.json();

        if (data.length === 0) {
            return;
        }

        //随机展示
        const randomIndex =
            Math.floor(Math.random() * data.length);

        const photo =
            data[randomIndex];

        document.getElementById("lifePhotoImage")
            .src = photo.imageUrl;

        document.getElementById("lifePhotoTitle")
            .innerText = photo.title;

        document.getElementById("lifePhotoDescription")
            .innerText = photo.description;

        document.getElementById("lifePhotoDate")
            .innerText = photo.photoDate;
    }

    const addPhotoBtn =
        document.getElementById("addPhotoBtn");

    const photoModal =
        document.getElementById("photoModal");

    const cancelPhotoBtn =
        document.getElementById("cancelPhotoBtn");

    const savePhotoBtn =
        document.getElementById("savePhotoBtn");

    addPhotoBtn.addEventListener("click", () => {

        photoModal.classList.add("show");

    });

    cancelPhotoBtn.addEventListener("click", () => {

        photoModal.classList.remove("show");

    });

    savePhotoBtn.addEventListener("click", async () => {

        const title =
            document.getElementById("photoTitleInput").value;

        const description =
            document.getElementById("photoDescriptionInput").value;

        const photoDate =
            document.getElementById("photoDateInput").value;

        const imageUrl =
            document.getElementById("photoImageInput").value;

        await fetch(
            "/api/life-photos",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title,
                    description,
                    photoDate,
                    imageUrl
                })
            }
        );

        photoModal.classList.remove("show");

        loadLifePhoto();

    });

    savePhotoBtn.addEventListener("click", async () => {

        const title = document.getElementById("photoTitleInput").value;
        const description = document.getElementById("photoDescriptionInput").value;
        const photoDate = document.getElementById("photoDateInput").value;
        const fileInput = document.getElementById("photoFileInput");
        const file = fileInput.files[0];

        if (!title || !description || !photoDate || !file) {
            alert("请填写完整信息并选择图片");
            return;
        }

        // 上传图片
        const formData = new FormData();
        formData.append("file", file);

        const uploadResp = await fetch("/api/files/upload", {
            method: "POST",
            body: formData
        });

        const imageUrl = await uploadResp.text(); // 返回的是图片 URL

        // 保存人生照片
        await fetch("/api/life-photos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title,
                description,
                photoDate,
                imageUrl
            })
        });

        photoModal.classList.remove("show");

        loadLifePhoto();
    });

    loadLifeEvents();
    loadPockets();
    loadAsset();
    loadLifePhoto();
</script>
</body>
</html>
